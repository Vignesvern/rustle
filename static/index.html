<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rustle</title>
  <style>
    :root { --bg:#0f1115; --panel:#171a21; --accent:#e2703a; --text:#e6e6e6; --muted:#8a8f98; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; background:var(--bg);
           color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { padding:14px 20px; background:var(--panel); border-bottom:1px solid #222; font-weight:600; }
    header .dot { color:var(--accent); }
    #status { float:right; font-weight:400; font-size:13px; color:var(--muted); }
    #log { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:8px; }
    .msg { max-width:70%; }
    .msg .name { font-size:12px; color:var(--accent); margin-bottom:2px; }
    .msg .body { background:var(--panel); padding:8px 12px; border-radius:10px;
                 display:inline-block; word-wrap:break-word; white-space:pre-wrap; }
    .msg.me { align-self:flex-end; text-align:right; }
    .msg.me .body { background:var(--accent); color:#111; }
    .system { align-self:center; font-size:12px; color:var(--muted); font-style:italic; }
    form { display:flex; gap:8px; padding:12px 20px; background:var(--panel); border-top:1px solid #222; }
    input { flex:1; padding:10px 12px; border-radius:8px; border:1px solid #2a2e37;
            background:#0d0f13; color:var(--text); font-size:14px; }
    button { padding:10px 18px; border:0; border-radius:8px; background:var(--accent);
             color:#111; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    #gate { position:fixed; inset:0; background:rgba(10,12,16,.96);
            display:flex; align-items:center; justify-content:center; }
    #gate .card { background:var(--panel); padding:28px; border-radius:14px; width:320px; text-align:center; }
    #gate h1 { margin:0 0 4px; }
    #gate p { color:var(--muted); margin:0 0 18px; font-size:14px; }
    #gate form { padding:0; background:none; border:0; flex-direction:column; }
  </style>
</head>
<body>
  <header>rustle <span class="dot">&#9679;</span> <span id="room">#general</span><span id="status">connecting&hellip;</span></header>
  <div id="log"></div>
  <form id="composer">
    <input id="input" autocomplete="off" placeholder="Type a message&hellip;" disabled>
    <button id="send" disabled>Send</button>
  </form>

  <div id="gate">
    <div class="card">
      <h1>rustle</h1>
      <p>Pick a name to join the room.</p>
      <form id="joinForm">
        <input id="nameInput" autocomplete="off" placeholder="Your name" maxlength="24" required>
        <button type="submit" style="margin-top:12px">Join chat</button>
      </form>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const status = document.getElementById('status');
    const composer = document.getElementById('composer');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const gate = document.getElementById('gate');
    const joinForm = document.getElementById('joinForm');
    const nameInput = document.getElementById('nameInput');

    let ws, myName;

    const escapeHtml = (s) => s.replace(/[&<>"']/g,
      c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));

    function addMessage(name, body, ts, mine) {
      const el = document.createElement('div');
      el.className = 'msg' + (mine ? ' me' : '');
      const time = ts ? new Date(ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
      el.innerHTML = `<div class="name">${escapeHtml(name)} `
        + `<span style="color:var(--muted)">${time}</span></div>`
        + `<span class="body">${escapeHtml(body)}</span>`;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    function addSystem(body) {
      const el = document.createElement('div');
      el.className = 'system';
      el.textContent = body;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
    }

    joinForm.addEventListener('submit', (e) => {
      e.preventDefault();
      myName = nameInput.value.trim();
      if (myName) connect();
    });

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/ws`);

      ws.onopen = () => {
        status.textContent = 'connected';
        ws.send(JSON.stringify({ type: 'join', name: myName }));
        gate.style.display = 'none';
        input.disabled = false; sendBtn.disabled = false; input.focus();
      };
      ws.onmessage = (ev) => {
        const m = JSON.parse(ev.data);
        if (m.type === 'message') addMessage(m.name, m.body, m.ts, m.name === myName);
        else if (m.type === 'system') addSystem(m.body);
      };
      ws.onclose = () => {
        status.textContent = 'disconnected';
        input.disabled = true; sendBtn.disabled = true;
        addSystem('Connection closed.');
      };
      ws.onerror = () => { status.textContent = 'error'; };
    }

    composer.addEventListener('submit', (e) => {
      e.preventDefault();
      const body = input.value.trim();
      if (!body || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'message', body }));
      input.value = '';
      input.focus();
    });
  </script>
</body>
</html>
