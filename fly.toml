# Fly.io deployment template. First time:
#   fly launch --no-deploy          # creates the app (adjusts this file's `app` name)
#   fly postgres create             # then: fly postgres attach <db-app>   (sets DATABASE_URL)
#   fly secrets set RUSTLE_JWT_SECRET=$(openssl rand -hex 32)
#   fly deploy
app = "rustle"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
