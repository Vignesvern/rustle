# Local development Postgres for rustle.
#   docker compose up -d
#   export DATABASE_URL=postgres://rustle:rustle@localhost:5432/rustle
#   cargo run
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rustle
      POSTGRES_PASSWORD: rustle
      POSTGRES_DB: rustle
    ports:
      - "5432:5432"
    volumes:
      - rustle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustle"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  rustle_pgdata:
