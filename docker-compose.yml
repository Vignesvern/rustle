# Full local stack: the app + Postgres.
#   docker compose up --build
#   open http://localhost:3000
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rustle
      POSTGRES_PASSWORD: rustle
      POSTGRES_DB: rustle
    ports:
      - "5432:5432"
    volumes:
      - rustle_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustle"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://rustle:rustle@db:5432/rustle
      RUSTLE_JWT_SECRET: dev-compose-secret-change-me
      RUSTLE_ADDR: 0.0.0.0:8080
      RUST_LOG: rustle=info,tower_http=info
    ports:
      - "3000:8080"

volumes:
  rustle_pgdata:
